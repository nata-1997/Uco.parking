services:
  # PostgreSQL para Kong (solo configuración de Kong). KONG_PG_PASSWORD es obligatoria (p. ej. Infisical).
  kong-db:
    image: postgres:15-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: ${KONG_DB_NAME:-kong}
      POSTGRES_USER: ${KONG_PG_USER:-kong}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:?Defina KONG_PG_PASSWORD en el entorno (p. ej. infisical run --env=dev)}
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Puerto diferente (5433) para no conflictuar
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-network

  # SQL Server opcional (perfil sql). En Windows el volumen a veces da "Access is denied";
  # si ya tienes SQL en el host (puerto 1433), no necesitas este servicio.
  sqlserver:
    profiles:
      - sql
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ucoparking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD al usar el perfil sql (p. ej. Infisical)}
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql/data
    ports:
      # 1433 suele estar ocupado por SQL Server en Windows; usa 14330 en el host
      - "14330:1433"
    networks:
      - kong-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migraciones de Kong (obligatorio con KONG_DATABASE=postgres; idempotente en reinicios)
  kong-migrations:
    image: kong:3.7
    container_name: kong-migrations
    command: sh -c "kong migrations bootstrap || kong migrations up"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:?Defina KONG_PG_PASSWORD en el entorno (p. ej. infisical run --env=dev)}
      KONG_PG_DATABASE: ${KONG_DB_NAME:-kong}
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - kong-network
    restart: "no"

  # Kong API Gateway
  kong:
    image: kong:3.7
    container_name: kong-api-gateway
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:?Defina KONG_PG_PASSWORD en el entorno (p. ej. infisical run --env=dev)}
      KONG_PG_DATABASE: ${KONG_DB_NAME:-kong}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"  # Proxy (cliente → Kong)
      - "8443:8443"  # Proxy HTTPS
      - "8001:8001"  # Admin API
      - "8444:8444"  # Admin HTTPS
    networks:
      - kong-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    # Spring en el host (Windows/Mac/Linux con Docker 20.10+)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Registra servicio + ruta hacia UcoParking (Spring en el host, puerto 8080 por defecto)
  kong-bootstrap-ucoparking:
    image: curlimages/curl:8.6.0
    container_name: kong-bootstrap-ucoparking
    depends_on:
      kong:
        condition: service_healthy
    environment:
      KONG_ADMIN: http://kong:8001
      UCOPARKING_UPSTREAM: ${UCOPARKING_UPSTREAM:-http://host.docker.internal:8080}
    volumes:
      - ./docker/kong/bootstrap-ucoparking.sh:/bootstrap.sh:ro
    networks:
      - kong-network
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

  # WAF: Nginx + ModSecurity + OWASP CRS → upstream Kong (misma red Docker).
  # Perfil "waf": no se arranca salvo que uses --profile waf (ver docs/MODSECURITY_UCOPARKING.md).
  modsecurity-waf:
    profiles:
      - waf
    image: owasp/modsecurity-crs:nginx
    container_name: ucoparking-modsecurity-waf
    depends_on:
      kong:
        condition: service_healthy
    environment:
      BACKEND: ${WAF_UPSTREAM_KONG:-http://kong:8000}
      PORT: "8080"
      # Dev recomendado: solo log, sin bloqueo. Producción: On tras afinar exclusiones CRS.
      MODSEC_RULE_ENGINE: ${MODSEC_RULE_ENGINE:-DetectionOnly}
      BLOCKING_PARANOIA: ${BLOCKING_PARANOIA:-1}
      SERVER_NAME: ${WAF_SERVER_NAME:-localhost}
      # Timeouts alineados con Kong por defecto (60s en imagen CRS); sube si hay subidas grandes.
      PROXY_TIMEOUT: ${WAF_PROXY_TIMEOUT:-120s}
    ports:
      # Entrada HTTP con WAF; mismo path-prefix /uco-parking que expone Kong.
      - "${WAF_HOST_PORT:-9080}:8080"
    networks:
      - kong-network

volumes:
  kong-db-data:
  sqlserver-data:

networks:
  kong-network:
    driver: bridge