spring:
  application:
    name: UcoParking

  # Valkey/Redis (compatible API Redis). Debe quedar bajo spring.data, no bajo spring.application.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  main:
    web-application-type: servlet

  profiles:
    active: dev

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # --- SQL Server ---
  # Secretos: Infisical (recomendado) u otras variables de entorno. Ver docs/INFISICAL_UCOPARKING.md.
  # Estándar Spring: SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
  # Alternativa: DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD.
  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:UCOParking};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.SQLServerDialect

  # Key Vault (Spring Cloud Azure 7). En dev suele ir en false; prod activa y define URI.
  cloud:
    azure:
      keyvault:
        secret:
          enabled: ${AZURE_KEYVAULT_ENABLED:false}
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_URI:}
              enabled: ${AZURE_KEYVAULT_ENABLED:false}

# (Propiedades antiguas azure.keyvault.* sustituidas por spring.cloud.azure.*)

server:
  # Escuchar en todas las interfaces para que Kong (Docker) llegue vía host.docker.internal:8080 en Windows/Mac.
  address: 0.0.0.0
  port: 8080
  servlet:
    # Prefijo para MVC/Tomcat (websocket trae servlet). El front usa /uco-parking/api/v1/...
    context-path: /uco-parking

# Auth0 (JWT). Ver docs/AUTH0_BACKEND.md y docs/INFISICAL_UCOPARKING.md.
# issuer: AUTH0_ISSUER_URI (recomendado, URL completa) o AUTH0_DOMAIN (p. ej. tu-tenant.us.auth0.com → https://…/)
# El front usa VITE_AUTH0_*; AUTH0_AUDIENCE debe coincidir con VITE_AUTH0_AUDIENCE si validas aud.
uco:
  auth0:
    issuer-uri: ${AUTH0_ISSUER_URI:}
    domain: ${AUTH0_DOMAIN:}
    audience: ${AUTH0_AUDIENCE:}
