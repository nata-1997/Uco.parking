spring:
  application:
    name: UcoParking

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  main:
    web-application-type: servlet

  profiles:
    active: dev

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    # Infisical suele exportar SPRING_DATASOURCE_*; si no existen, se usa DB_* / valores por defecto (Docker local).
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:UCOParking};encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.SQLServerDialect

  cloud:
    azure:
      keyvault:
        secret:
          enabled: ${AZURE_KEYVAULT_ENABLED:false}
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_URI:}
              enabled: ${AZURE_KEYVAULT_ENABLED:false}

server:
  port: 8080
  servlet:
    context-path: /uco-parking

uco:
  auth0:
    issuer-uri: ${AUTH0_ISSUER_URI:}
    audience: ${AUTH0_AUDIENCE:}

# SendGrid (remitente debe estar verificado en https://sendgrid.com — p. ej. dominio Microsoft 365 / Outlook)
sendgrid:
  enabled: ${SENDGRID_ENABLED:true}
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:}
  from-name: ${SENDGRID_FROM_NAME:UcoParking}