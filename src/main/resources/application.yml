spring:
  application:
    name: UcoParking

  # Valkey/Redis (compatible API Redis). Debe quedar bajo spring.data, no bajo spring.application.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  main:
    web-application-type: servlet

  profiles:
    active: dev

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # --- SQL Server ---
  # Secretos: Infisical (recomendado) u otras variables de entorno. Ver docs/INFISICAL_UCOPARKING.md.
  # Estándar Spring: SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
  # Alternativa: DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD.
  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:UCOParking};encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.SQLServerDialect

  cloud:
    azure:
      keyvault:
        secret:
          enabled: ${AZURE_KEYVAULT_ENABLED:false}
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_URI:}
              enabled: ${AZURE_KEYVAULT_ENABLED:false}

server:
  # Escuchar en todas las interfaces para que Kong (Docker) llegue vía host.docker.internal:8080 en Windows/Mac.
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /uco-parking

# Auth0 (JWT). Ver docs/AUTH0_BACKEND.md y docs/INFISICAL_UCOPARKING.md.
# issuer: AUTH0_ISSUER_URI (recomendado, URL completa) o AUTH0_DOMAIN (p. ej. tu-tenant.us.auth0.com → https://…/)
# El front usa VITE_AUTH0_*; AUTH0_AUDIENCE debe coincidir con VITE_AUTH0_AUDIENCE si validas aud.
uco:
  auth0:
    issuer-uri: ${AUTH0_ISSUER_URI:}
    domain: ${AUTH0_DOMAIN:}
    audience: ${AUTH0_AUDIENCE:}

# SendGrid (remitente debe estar verificado en https://sendgrid.com — p. ej. dominio Microsoft 365 / Outlook)
sendgrid:
  enabled: ${SENDGRID_ENABLED:true}
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:}
  from-name: ${SENDGRID_FROM_NAME:UcoParking}
