spring.application.name=UcoParking

spring.config.import=optional:classpath:application-secrets.properties

spring.webflux.base-path=/uco-parking

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# SQL Server — usuario/contraseña en application-secrets.properties (o DB_USERNAME / DB_PASSWORD)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=UCOParking;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
