UCOPARKING-COMMON-001=Ocurrió un error inesperado. Intente nuevamente más tarde.
UCOPARKING-COMMON-001.technical=Excepción no controlada durante el procesamiento de la solicitud.

UCOPARKING-COMMON-002=La solicitud no pudo ser procesada.
UCOPARKING-COMMON-002.technical=La carga útil o los parámetros de la solicitud no son válidos.

UCOPARKING-COMMON-003=El recurso solicitado no fue encontrado.
UCOPARKING-COMMON-003.technical=No existe un recurso que coincida con el identificador solicitado.

UCOPARKING-COMMON-004=Se encontraron uno o más errores de validación.
UCOPARKING-COMMON-004.technical=La validación de la solicitud falló.

UCOPARKING-STUDENT-001=El correo electrónico no es válido.
UCOPARKING-STUDENT-001.technical=El valor del correo del estudiante no cumple el formato esperado.

UCOPARKING-STUDENT-002=Falta un campo obligatorio.
UCOPARKING-STUDENT-002.technical=El registro del estudiante no incluye un campo obligatorio.

UCOPARKING-STUDENT-003=El programa académico es obligatorio.
UCOPARKING-STUDENT-003.technical=El campo academicProgram es obligatorio para el registro del estudiante.

UCOPARKING-STUDENT-004=El tipo de identificación es obligatorio.
UCOPARKING-STUDENT-004.technical=El campo idType es obligatorio para el registro del estudiante.

UCOPARKING-STUDENT-005=El número de identificación no es válido.
UCOPARKING-STUDENT-005.technical=El campo idNumber no cumple el formato esperado.

UCOPARKING-STUDENT-006=El número de celular no es válido.
UCOPARKING-STUDENT-006.technical=El campo mobileNumber no cumple el formato esperado.

UCOPARKING-STUDENT-007=El estudiante fue registrado correctamente.
UCOPARKING-STUDENT-007.technical=El registro del estudiante finalizó correctamente.

UCOPARKING-PARKING-001=No se encontró el cupo solicitado.
UCOPARKING-PARKING-001.technical=No existe un ParkingSpot con el código indicado.

UCOPARKING-PARKING-002=El cupo no está disponible para reservar.
UCOPARKING-PARKING-002.technical=El estado del cupo no es AVAILABLE.

UCOPARKING-PARKING-003=La placa no cumple el formato (tres letras y tres números).
UCOPARKING-PARKING-003.technical=El valor de plate no cumple el patrón AAA###.

UCOPARKING-PARKING-004=Solo se puede liberar un cupo reservado u ocupado.
UCOPARKING-PARKING-004.technical=El estado del cupo no es RESERVED ni OCCUPIED.

UCOPARKING-PARKING-005=El rango horario de la reserva no es válido.
UCOPARKING-PARKING-005.technical=startTime y endTime son obligatorios y endTime debe ser mayor a startTime.

UCOPARKING-PARKING-006=La hora de entrada no puede ser anterior a la fecha y hora actual (Colombia, Bogotá).
UCOPARKING-PARKING-006.technical=startTime interpretado en America/Bogota es anterior al instante actual en esa zona.
